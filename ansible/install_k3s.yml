---
- name: Setup K3s Master (Control Plane)
  hosts: master
  become: true
  tasks:
    - name: Installa K3s sul nodo Master
      shell: curl -sfL https://get.k3s.io | sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Recupera il token del cluster per far unire i worker
      slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: node_token_b64

    - name: Salva il token come variabile
      set_fact:
        k3s_token: "{{ node_token_b64['content'] | b64decode | trim }}"

    - name: Mostra i primi caratteri del token per debug
      debug:
        msg: "Token recuperato con successo, inizia con: {{ k3s_token[:10] }}..."

- name: Setup K3s Workers
  hosts: workers
  become: true
  tasks:
    - name: Installa K3s e unisci i Worker al cluster
      shell: >
        curl -sfL https://get.k3s.io | K3S_URL=https://{{ hostvars[groups['master'][0]]['ansible_host'] }}:6443 K3S_TOKEN={{ hostvars[groups['master'][0]]['k3s_token'] }} sh -
      args:
        creates: /usr/local/bin/k3s