services:
  db:
    image: postgres:15-alpine
    container_name: devops_postgres_db
    environment:
      POSTGRES_DB: tasksdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tasksdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: devops_flask_backend
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_NAME=tasksdb
      - DB_USER=postgres
      - DB_PASSWORD=secret
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: devops_nginx_frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data: